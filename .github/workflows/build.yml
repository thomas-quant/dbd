name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: NuGet/setup-nuget@v2

      - uses: actions/cache@v4
        with:
          path: packages
          key: nuget-${{ hashFiles('main/packages.config') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore unlock.sln

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild unlock.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - uses: actions/upload-artifact@v4
        with:
          name: DecoyRequest
          path: main/bin/Release/DecoyRequest.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes "main\bin\Release\DecoyRequest.exe"
        env:
          GH_TOKEN: ${{ github.token }}
